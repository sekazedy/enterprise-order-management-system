spring.application.name=enterprise-order-management-system

spring.datasource.url=jdbc:postgresql://localhost:5432/${POSTGRES_DB:eoms_db}
spring.datasource.username=${POSTGRES_USER:admin}
spring.datasource.password=${POSTGRES_PASSWORD:admin}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true